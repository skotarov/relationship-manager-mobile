name: Export mobile debug tree

on:
  push:
    branches:
      - agent/refactor-large-mobile-files
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: relationship-manager-mobile-tree
          path: mobile/calllog-android
          if-no-files-found: error
          retention-days: 1
