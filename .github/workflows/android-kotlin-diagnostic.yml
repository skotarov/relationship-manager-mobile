name: Android Kotlin Diagnostic

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/android-kotlin-diagnostic.yml
      - mobile/calllog-android/**

jobs:
  diagnose:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/calllog-android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install debug keystore
        run: |
          mkdir -p "$HOME/.android"
          base64 -d debug-signing/callreport-debug.keystore.base64 > "$HOME/.android/debug.keystore"

      - name: Kotlin compiler error summary
        run: |
          set +e
          gradle --no-daemon --console=plain :app:assembleDebug > build-debug.log 2>&1
          result=$?
          if [ "$result" -eq 0 ]; then
            echo "BUILD_OK"
            exit 0
          fi
          echo "KOTLIN_ERROR_SUMMARY"
          grep -E '(^e: |\.kt:[0-9]+:[0-9]+:|error: |Unresolved reference|Type mismatch|Cannot access)' build-debug.log | head -80 || true
          exit "$result"
