name: Android Build Diagnostics

on:
  pull_request:
    paths:
      - mobile/calllog-android/**
      - .github/workflows/android-kotlin-diagnostics.yml
  workflow_dispatch:

jobs:
  android-build-diagnostics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/calllog-android
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Compile Kotlin and capture diagnostics
        id: compile
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --console=plain :app:compileDebugKotlin --stacktrace --info 2>&1 | tee "$RUNNER_TEMP/kotlin-compile.log"
          exit "${PIPESTATUS[0]}"

      - name: Run Android lint and capture diagnostics
        id: lint
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --console=plain :app:lintDebug --stacktrace --info 2>&1 | tee "$RUNNER_TEMP/android-lint.log"
          exit "${PIPESTATUS[0]}"

      - name: Publish concise diagnostics
        if: always()
        shell: bash
        run: |
          {
            echo "## Kotlin compiler diagnostics"
            echo '```text'
            grep -E '(^e: |error: |Unresolved reference|Type mismatch|No value passed|Cannot access|Expecting )' "$RUNNER_TEMP/kotlin-compile.log" || true
            echo '```'
            echo "## Android lint diagnostics"
            echo '```text'
            grep -E '(^[A-Za-z0-9_./-]+\.xml:[0-9]+:|^[A-Za-z0-9_./-]+\.kt:[0-9]+:|Error:|Warning:|[0-9]+ errors, [0-9]+ warnings)' "$RUNNER_TEMP/android-lint.log" || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full Android diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-diagnostics
          path: |
            ${{ runner.temp }}/kotlin-compile.log
            ${{ runner.temp }}/android-lint.log
            mobile/calllog-android/app/build/reports/lint-results-debug.html
            mobile/calllog-android/app/build/reports/lint-results-debug.xml
            mobile/calllog-android/app/build/reports/lint-results-debug.txt
          if-no-files-found: warn

      - name: Fail when compilation or lint failed
        if: steps.compile.outcome == 'failure' || steps.lint.outcome == 'failure'
        run: exit 1
