name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/android-build.yml
      - mobile/calllog-android/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/calllog-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install fixed debug keystore
        run: |
          mkdir -p "$HOME/.android"
          base64 -d debug-signing/callreport-debug.keystore.base64 > "$HOME/.android/debug.keystore"
          keytool -list \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey > /dev/null

      - name: Build debug APK
        run: gradle --no-daemon :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: callreport-debug-apk
          path: mobile/calllog-android/app/build/outputs/apk/debug/callreport-debug.apk
          if-no-files-found: error
