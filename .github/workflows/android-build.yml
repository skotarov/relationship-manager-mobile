name: Android CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/android-build.yml
      - mobile/calllog-android/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/android-build.yml
      - mobile/calllog-android/**

jobs:
  build-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/calllog-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install fixed debug keystore
        run: |
          mkdir -p "$HOME/.android"
          base64 -d debug-signing/callreport-debug.keystore.base64 > "$HOME/.android/debug.keystore"
          keytool -list \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey > /dev/null

      - name: Validate Android value resources
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from xml.etree import ElementTree as ET
          import re
          import sys

          resources_root = Path("app/src/main/res")
          errors = []
          checked = 0
          types_by_name = {}
          placeholders_by_key = {}
          placeholder_re = re.compile(r"%(?:(\d+)\$)?([a-zA-Z])")

          for directory in sorted(resources_root.iterdir()):
              if not directory.is_dir() or not (directory.name == "values" or directory.name.startswith("values-")):
                  continue

              seen = {}
              for entry in sorted(directory.iterdir()):
                  if entry.is_file() and entry.suffix.lower() != ".xml":
                      errors.append(f"Non-XML file in {directory}: {entry.name}")

              for xml_file in sorted(directory.glob("*.xml")):
                  checked += 1
                  try:
                      root = ET.parse(xml_file).getroot()
                  except ET.ParseError as error:
                      errors.append(f"Invalid XML in {xml_file}: {error}")
                      continue

                  if root.tag != "resources":
                      errors.append(f"Root element in {xml_file} must be <resources>, found <{root.tag}>")
                      continue

                  for child in root:
                      tag = child.tag.split("}")[-1] if isinstance(child.tag, str) else ""
                      name = child.attrib.get("name")
                      if not name:
                          continue
                      resource_type = child.attrib.get("type") if tag == "item" else tag
                      key = (resource_type, name)
                      previous = seen.get(key)
                      if previous is not None:
                          errors.append(
                              f"Duplicate {resource_type} resource '{name}' in {directory}: "
                              f"{previous.name} and {xml_file.name}"
                          )
                      else:
                          seen[key] = xml_file

                      types_by_name.setdefault(name, set()).add(resource_type)
                      text = "".join(child.itertext())
                      placeholders = tuple(placeholder_re.findall(text))
                      existing_placeholders = placeholders_by_key.get(key)
                      if existing_placeholders is None:
                          placeholders_by_key[key] = placeholders
                      elif existing_placeholders != placeholders:
                          errors.append(
                              f"Format placeholders differ for {resource_type} resource '{name}': "
                              f"{existing_placeholders} versus {placeholders} in {xml_file}"
                          )

          for name, resource_types in sorted(types_by_name.items()):
              if len(resource_types) > 1:
                  errors.append(
                      f"Resource name '{name}' is declared with incompatible types across values folders: "
                      f"{', '.join(sorted(resource_types))}"
                  )

          if errors:
              print("Android values resource validation failed:")
              print("\n".join(f"- {error}" for error in errors))
              sys.exit(1)

          print(f"Android values resource validation passed ({checked} XML files checked).")
          PY

      - name: Compile value XML resources one by one
        run: |
          AAPT2="${ANDROID_HOME}/build-tools/35.0.0/aapt2"
          test -x "$AAPT2"
          output_root="$(mktemp -d)"
          while IFS= read -r -d '' resource_file; do
            output_dir="$output_root/$(printf '%s' "$resource_file" | sha256sum | cut -d' ' -f1)"
            mkdir -p "$output_dir"
            echo "AAPT2 compile: $resource_file"
            "$AAPT2" compile -o "$output_dir" "$resource_file"
          done < <(find app/src/main/res -type f \( -path '*/values/*.xml' -o -path '*/values-*/*.xml' \) -print0 | sort -z)

      - name: Lint debug build
        run: gradle --no-daemon --console=plain :app:lintDebug

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          set -o pipefail
          gradle --no-daemon --console=plain :app:assembleDebug 2>&1 | tee /tmp/callreport-gradle.log
          gradle_status=${PIPESTATUS[0]}

          if [ "$gradle_status" -ne 0 ]; then
            echo
            echo "========== ТОЧНИ ГРЕШКИ ОТ КОМПИЛАЦИЯТА =========="
            grep -E '(^e: |\.kt:[0-9]+:[0-9]+|\.xml:[0-9]+:[0-9]+|Unresolved reference:|Redeclaration:|error:)' /tmp/callreport-gradle.log || true
            echo "========== КРАЙ НА ГРЕШКИТЕ =========="
            exit "$gradle_status"
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlineimoti-crm-debug-apk
          path: mobile/calllog-android/app/build/outputs/apk/debug/onlineimoti-crm-debug.apk
          if-no-files-found: error
