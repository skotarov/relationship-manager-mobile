name: Kotlin Source Size Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/source-size-audit.yml
      - mobile/calllog-android/**

jobs:
  audit-kotlin-source-size:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/calllog-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Kotlin files over 300 lines
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import sys

          limit = 300
          oversized = []
          for path in sorted(Path("app/src").rglob("*.kt")):
              try:
                  lines = len(path.read_text(encoding="utf-8").splitlines())
              except UnicodeDecodeError:
                  lines = len(path.read_text(encoding="utf-8", errors="replace").splitlines())
              if lines > limit:
                  oversized.append((lines, path.as_posix()))

          if oversized:
              print(f"Kotlin files over {limit} lines:")
              for lines, path in sorted(oversized, reverse=True):
                  print(f"{lines:4d}  {path}")
              sys.exit(1)

          print(f"All Kotlin files are at or below {limit} lines.")
          PY
