name: Build signed Play bundle

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: Higher integer than the previous Play upload
        required: true
        default: "1"
      version_name:
        description: Visible app version, for example 1.0.0
        required: true
        default: "1.0.0"

jobs:
  bundle-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile/calllog-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Restore Play upload signing files
        env:
          PLAY_UPLOAD_KEYSTORE_BASE64: ${{ secrets.PLAY_UPLOAD_KEYSTORE_BASE64 }}
          PLAY_SIGNING_PROPERTIES_BASE64: ${{ secrets.PLAY_SIGNING_PROPERTIES_BASE64 }}
        run: |
          test -n "$PLAY_UPLOAD_KEYSTORE_BASE64" || { echo "Missing PLAY_UPLOAD_KEYSTORE_BASE64."; exit 1; }
          test -n "$PLAY_SIGNING_PROPERTIES_BASE64" || { echo "Missing PLAY_SIGNING_PROPERTIES_BASE64."; exit 1; }
          printf '%s' "$PLAY_UPLOAD_KEYSTORE_BASE64" | base64 --decode > play-upload.jks
          printf '%s' "$PLAY_SIGNING_PROPERTIES_BASE64" | base64 --decode > play-signing.properties
          test -s play-upload.jks
          test -s play-signing.properties
          grep -qx 'storeFile=play-upload.jks' play-signing.properties || {
            echo "play-signing.properties must contain storeFile=play-upload.jks for this workflow."
            exit 1
          }

      - name: Build signed Android App Bundle
        run: |
          gradle --no-daemon --console=plain \
            -PplayVersionCode="${{ inputs.version_code }}" \
            -PplayVersionName="${{ inputs.version_name }}" \
            :app:bundleRelease

      - name: Upload Play bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlineimoti-crm-${{ inputs.version_name }}-aab
          path: mobile/calllog-android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
