name: Android Unit Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/android-unit-tests.yml
      - mobile/calllog-android/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/android-unit-tests.yml
      - mobile/calllog-android/**

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/calllog-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Configure Android SDK
        shell: bash
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          test -d "$sdk_root"
          sdkmanager_path="$(find "$sdk_root/cmdline-tools" -type f -path '*/bin/sdkmanager' | sort -V | tail -n 1)"
          test -n "$sdkmanager_path"
          test -x "$sdkmanager_path"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          echo "$(dirname "$sdkmanager_path")" >> "$GITHUB_PATH"
          echo "$sdk_root/platform-tools" >> "$GITHUB_PATH"

      - name: Run debug unit tests
        run: gradle --no-daemon --console=plain :app:testDebugUnitTest
